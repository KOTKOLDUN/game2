</div>

<div id="menu">
<h1>OCEAN OVERLORD</h1>
<button id="startBtn">Start Game</button>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const GAME_WIDTH=canvas.width
const GAME_HEIGHT=canvas.height

let lastTime=0
let delta=0

let gameRunning=false

const keys={}
const mouse={x:0,y:0}

window.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true
})

window.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false
})

window.addEventListener("mousemove",e=>{
mouse.x=e.clientX
mouse.y=e.clientY
})

class Vector2{

constructor(x=0,y=0){
this.x=x
this.y=y
}

add(v){
this.x+=v.x
this.y+=v.y
}

multiply(s){
this.x*=s
this.y*=s
}

length(){
return Math.sqrt(this.x*this.x+this.y*this.y)
}

normalize(){
let l=this.length()
if(l>0){
this.x/=l
this.y/=l
}
}

}

class Camera{

constructor(){
this.x=0
this.y=0
this.smooth=0.1
}

follow(target){

this.x+=(target.x-this.x)*this.smooth
this.y+=(target.y-this.y)*this.smooth

}

}

const camera=new Camera()

class GameObject{

constructor(x,y){

this.x=x
this.y=y

this.vx=0
this.vy=0

this.size=20

this.dead=false

}

update(dt){}

draw(ctx){

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(this.x-camera.x+GAME_WIDTH/2,this.y-camera.y+GAME_HEIGHT/2,this.size,0,Math.PI*2)
ctx.fill()

}

}

class GameEngine{

constructor(){

this.objects=[]

}

add(obj){
this.objects.push(obj)
}

update(dt){

for(let i=this.objects.length-1;i>=0;i--){

let obj=this.objects[i]

if(obj.dead){
this.objects.splice(i,1)
continue
}

obj.update(dt)

}

}

draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let obj of this.objects){
obj.draw(ctx)
}

}

}

const engine=new GameEngine()

class Player extends GameObject{

constructor(){

super(0,0)

this.speed=200
this.size=12

this.xp=0
this.level=1
this.coins=0

this.health=100

}

update(dt){

let dir=new Vector2(mouse.x-GAME_WIDTH/2,mouse.y-GAME_HEIGHT/2)

dir.normalize()

this.vx=dir.x*this.speed
this.vy=dir.y*this.speed

this.x+=this.vx*dt
this.y+=this.vy*dt

camera.follow(this)

}

draw(ctx){

ctx.fillStyle="#00d0ff"

ctx.beginPath()
ctx.arc(this.x-camera.x+GAME_WIDTH/2,this.y-camera.y+GAME_HEIGHT/2,this.size,0,Math.PI*2)
ctx.fill()

}

}

let player=new Player()

engine.add(player)

function gameLoop(time){

delta=(time-lastTime)/1000
lastTime=time

if(gameRunning){

engine.update(delta)
engine.draw()

}

requestAnimationFrame(gameLoop)

}

requestAnimationFrame(gameLoop)

document.getElementById("startBtn").onclick=()=>{

document.getElementById("menu").style.display="none"

gameRunning=true

}

================================ */

/* ===============================
   FISH CLASS
================================ */

class Fish extends GameObject{

constructor(x,y,species){

super(x,y)

this.species=species

this.size=species.size
this.speed=species.speed

this.color=species.color

this.xp=species.xp

this.predator=species.predator

this.target=null

this.wanderAngle=Math.random()*Math.PI*2

this.fleeTimer=0

}



update(dt){

let dx=player.x-this.x
let dy=player.y-this.y

let dist=Math.sqrt(dx*dx+dy*dy)



/* FLEE BEHAVIOR */

if(!this.predator && dist<200){

this.fleeTimer=1

}



if(this.fleeTimer>0){

this.fleeTimer-=dt

let dirX=-dx/dist
let dirY=-dy/dist

this.vx=dirX*this.speed
this.vy=dirY*this.speed

}



/* HUNT BEHAVIOR */

else if(this.predator){

let dx=player.x-this.x
let dy=player.y-this.y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<300){

this.vx=(dx/dist)*this.speed
this.vy=(dy/dist)*this.speed

}

else{

this.wander(dt)

}

}



/* NORMAL WANDER */

else{

this.wander(dt)

}



/* MOVEMENT */

this.x+=this.vx*dt
this.y+=this.vy*dt



/* EAT CHECK */

let eatDist=this.size+player.size

if(dist<eatDist){

if(player.size>this.size){

this.dead=true

player.xp+=this.xp
player.coins+=1

}

else{

player.health-=10

}

}

}



wander(dt){

this.wanderAngle+= (Math.random()-0.5)*0.5

this.vx=Math.cos(this.wanderAngle)*this.speed*0.4
this.vy=Math.sin(this.wanderAngle)*this.speed*0.4

}



draw(ctx){

ctx.fillStyle=this.color

ctx.beginPath()

ctx.arc(
this.x-camera.x+GAME_WIDTH/2,
this.y-camera.y+GAME_HEIGHT/2,
this.size,
0,
Math.PI*2)

ctx.fill()

}

}



/* ===============================
   FISH SCHOOL SYSTEM
================================ */

class FishSchool{

constructor(x,y,species,count){

this.fish=[]

for(let i=0;i<count;i++){

let fx=x+(Math.random()*100-50)
let fy=y+(Math.random()*100-50)

let f=new Fish(fx,fy,species)

this.fish.push(f)

engine.add(f)

}

}

}



/* ===============================
   FISH SPAWNER
================================ */

class FishSpawner{

constructor(){

this.timer=0

}



update(dt){

this.timer-=dt

if(this.timer<=0){

this.spawnSchool()

this.timer=3+Math.random()*3

}

}



spawnSchool(){

let dist=800

let angle=Math.random()*Math.PI*2

let x=player.x+Math.cos(angle)*dist
let y=player.y+Math.sin(angle)*dist

let species=FishSpecies[Math.floor(Math.random()*FishSpecies.length)]

let count=3+Math.floor(Math.random()*8)

new FishSchool(x,y,species,count)

}

}



const fishSpawner=new FishSpawner()

engine.add({
update(dt){
fishSpawner.update(dt)
},
draw(){}
})



/* ===============================
   XP SYSTEM
================================ */

function updateXP(){

let levelXP=player.level*50

if(player.xp>=levelXP){

player.xp-=levelXP
player.level++

player.size+=2
player.speed+=10

}

let percent=(player.xp/levelXP)*100

document.getElementById("xpFill").style.width=percent+"%"

}



/* ===============================
   HUD UPDATE
================================ */

setInterval(()=>{

document.getElementById("coins").innerText="Coins: "+player.coins

updateXP()

},200)



/* ===============================

================================ */

for(let i=0;i<30;i++){

let x=Math.random()*2000-1000
let y=Math.random()*2000-1000

let species=FishSpecies[Math.floor(Math.random()*10)]

engine.add(new Fish(x,y,species))

/* =================================
   SIMPLE NOISE GENERATOR
================================= */

class Noise{

static random2(x,y){

let n=x*374761+y*668265

n=(n^(n>>13))*1274126177

return ((n^(n>>16))&0xffff)/65535

}

}



/* =================================
   WORLD CLASS
================================= */

class OceanWorld{

constructor(){

this.tileSize=400

this.tiles={}

}



getTile(tx,ty){

let key=tx+"_"+ty

if(!this.tiles[key]){

this.tiles[key]=this.generateTile(tx,ty)

}

return this.tiles[key]

}



generateTile(tx,ty){

let n=Noise.random2(tx,ty)

let biomeIndex=Math.floor(n*BIOMES.length)

let biome=BIOMES[biomeIndex]

return{

tx,
ty,
biome

}

}



draw(ctx){

let startX=Math.floor((camera.x-GAME_WIDTH)/this.tileSize)
let endX=Math.floor((camera.x+GAME_WIDTH)/this.tileSize)

let startY=Math.floor((camera.y-GAME_HEIGHT)/this.tileSize)
let endY=Math.floor((camera.y+GAME_HEIGHT)/this.tileSize)



for(let x=startX;x<=endX;x++){

for(let y=startY;y<=endY;y++){

let tile=this.getTile(x,y)

let px=x*this.tileSize
let py=y*this.tileSize

ctx.fillStyle=tile.biome.color

ctx.fillRect(
px-camera.x+GAME_WIDTH/2,
py-camera.y+GAME_HEIGHT/2,
this.tileSize,
this.tileSize)

}

}

}

}



const world=new OceanWorld()



engine.draw=function(){

ctx.clearRect(0,0,canvas.width,canvas.height)

world.draw(ctx)

for(let obj of this.objects){
obj.draw(ctx)
}

}



/* =================================
   BUBBLE PARTICLES
================================= */

class Bubble extends GameObject{

constructor(x,y){

super(x,y)

this.size=2+Math.random()*4
this.vy=-20-Math.random()*30
this.life=3

}



update(dt){

this.life-=dt

if(this.life<=0) this.dead=true

this.y+=this.vy*dt

}



draw(ctx){

ctx.fillStyle="rgba(200,230,255,0.6)"

ctx.beginPath()

ctx.arc(
this.x-camera.x+GAME_WIDTH/2,
this.y-camera.y+GAME_HEIGHT/2,
this.size,
0,
Math.PI*2)

ctx.fill()

}

}



class BubbleSystem{

constructor(){

this.timer=0

}



update(dt){

this.timer-=dt

if(this.timer<0){

this.spawn()

this.timer=0.2

}

}



spawn(){

let x=player.x+(Math.random()*200-100)
let y=player.y+(Math.random()*200-100)

engine.add(new Bubble(x,y))

}

}



const bubbleSystem=new BubbleSystem()

engine.add({
update(dt){bubbleSystem.update(dt)},
draw(){}
})



/* =================================
   JELLYFISH (BIOLUMINESCENT)
================================= */

class Jellyfish extends GameObject{

constructor(x,y){

super(x,y)

this.size=15+Math.random()*10
this.phase=Math.random()*10

}



update(dt){

this.phase+=dt

this.y+=Math.sin(this.phase)*20*dt

}



draw(ctx){

let px=this.x-camera.x+GAME_WIDTH/2
let py=this.y-camera.y+GAME_HEIGHT/2

let glow=ctx.createRadialGradient(px,py,0,px,py,this.size*3)

glow.addColorStop(0,"rgba(200,100,255,0.8)")
glow.addColorStop(1,"rgba(200,100,255,0)")

ctx.fillStyle=glow

ctx.beginPath()
ctx.arc(px,py,this.size*3,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="#cc88ff"

ctx.beginPath()
ctx.arc(px,py,this.size,0,Math.PI*2)
ctx.fill()

}

}



/* =================================
   SPAWN JELLYFISH
================================= */

for(let i=0;i<15;i++){

let x=Math.random()*3000-1500
let y=Math.random()*3000-1500

engine.add(new Jellyfish(x,y))

}



/* =================================
   WATER CURRENT SYSTEM
================================= */

class CurrentField{

getForce(x,y){

let n=Noise.random2(Math.floor(x/500),Math.floor(y/500))

let angle=n*Math.PI*2

return{

x:Math.cos(angle)*10,
y:Math.sin(angle)*10

}

}

}



const currentField=new CurrentField()



engine.add({

update(dt){

let f=currentField.getForce(player.x,player.y)

player.x+=f.x*dt
player.y+=f.y*dt

},

draw(){}

})



/* =================================
   DEPTH FOG
================================= */

function drawDepthFog(){

let depth=Math.abs(player.y)/2000

let alpha=Math.min(depth,0.6)

ctx.fillStyle="rgba(0,0,0,"+alpha+")"

ctx.fillRect(0,0,canvas.width,canvas.height)

}



const oldDraw=engine.draw

engine.draw=function(){

oldDraw.call(engine)

drawDepthFog()

} 
/* ================================
   DAMAGE SYSTEM
================================ */

function dealDamage(target,damage){

target.health-=damage

if(target.health<=0){

target.dead=true

}

}



/* ================================
   BLOOD PARTICLES
================================ */

class BloodParticle extends GameObject{

constructor(x,y){

super(x,y)

this.size=2+Math.random()*3

this.vx=(Math.random()-0.5)*200
this.vy=(Math.random()-0.5)*200

this.life=1

}

update(dt){

this.life-=dt

if(this.life<=0) this.dead=true

this.x+=this.vx*dt
this.y+=this.vy*dt

this.vx*=0.95
this.vy*=0.95

}

draw(ctx){

ctx.fillStyle="rgba(200,0,0,0.7)"

ctx.beginPath()

ctx.arc(
this.x-camera.x+GAME_WIDTH/2,
this.y-camera.y+GAME_HEIGHT/2,
this.size,
0,
Math.PI*2)

ctx.fill()

}

}



function spawnBlood(x,y,count){

for(let i=0;i<count;i++){

engine.add(new BloodParticle(x,y))

}

}



/* ================================
   ENEMY BASE CLASS
================================ */

class Enemy extends GameObject{

constructor(x,y){

super(x,y)

this.health=100
this.damage=10

this.speed=80

this.target=null

}



update(dt){

let dx=player.x-this.x
let dy=player.y-this.y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<500){

this.vx=(dx/dist)*this.speed
this.vy=(dy/dist)*this.speed

}

else{

this.vx*=0.98
this.vy*=0.98

}



this.x+=this.vx*dt
this.y+=this.vy*dt



/* ATTACK PLAYER */

if(dist<this.size+player.size){

dealDamage(player,this.damage)

spawnBlood(player.x,player.y,8)

}

}

}



/* ================================
   SHARK
================================ */

class Shark extends Enemy{

constructor(x,y){

super(x,y)

this.size=40
this.speed=120
this.health=200
this.damage=20

}



draw(ctx){

ctx.fillStyle="#666"

ctx.beginPath()

ctx.arc(
this.x-camera.x+GAME_WIDTH/2,
this.y-camera.y+GAME_HEIGHT/2,
this.size,
0,
Math.PI*2)

ctx.fill()

}

}



/* ================================
   GIANT SQUID
================================ */

class GiantSquid extends Enemy{

constructor(x,y){

super(x,y)

this.size=50
this.speed=80
this.health=300
this.damage=25

this.phase=0

}



update(dt){

super.update(dt)

this.phase+=dt

this.y+=Math.sin(this.phase)*20*dt

}



draw(ctx){

let px=this.x-camera.x+GAME_WIDTH/2
let py=this.y-camera.y+GAME_HEIGHT/2

ctx.fillStyle="#aa44ff"

ctx.beginPath()
ctx.arc(px,py,this.size,0,Math.PI*2)
ctx.fill()

for(let i=0;i<6;i++){

let angle=i*Math.PI/3+this.phase

ctx.beginPath()

ctx.moveTo(px,py)

ctx.lineTo(
px+Math.cos(angle)*this.size*2,
py+Math.sin(angle)*this.size*2)

ctx.strokeStyle="#aa44ff"
ctx.stroke()

}

}

}



/* ================================
   KILLER WHALE
================================ */

class KillerWhale extends Enemy{

constructor(x,y){

super(x,y)

this.size=70
this.speed=140
this.health=500
this.damage=35

}



draw(ctx){

ctx.fillStyle="#000"

ctx.beginPath()

ctx.arc(
this.x-camera.x+GAME_WIDTH/2,
this.y-camera.y+GAME_HEIGHT/2,
this.size,
0,
Math.PI*2)

ctx.fill()

ctx.fillStyle="#fff"

ctx.beginPath()

ctx.arc(
this.x-camera.x+GAME_WIDTH/2,
this.y-camera.y+GAME_HEIGHT/2,
this.size*0.4,
0,
Math.PI*2)

ctx.fill()

}

}



/* ================================
   ENEMY SPAWNER
================================ */

class EnemySpawner{

constructor(){

this.timer=0

}



update(dt){

this.timer-=dt

if(this.timer<=0){

this.spawn()

this.timer=10+Math.random()*10

}

}



spawn(){

let angle=Math.random()*Math.PI*2

let dist=1200

let x=player.x+Math.cos(angle)*dist
let y=player.y+Math.sin(angle)*dist

let r=Math.random()

if(r<0.5){

engine.add(new Shark(x,y))

}
else if(r<0.8){

engine.add(new GiantSquid(x,y))

}
else{

engine.add(new KillerWhale(x,y))

}

}

}



const enemySpawner=new EnemySpawner()

engine.add({
update(dt){enemySpawner.update(dt)},
draw(){}
})



/* ================================
   PLAYER ATTACK
================================ */

window.addEventListener("keydown",e=>{

if(e.code==="Space"){

playerAttack()

}

})



function playerAttack(){

let range=player.size+40

for(let obj of engine.objects){

if(obj instanceof Enemy){

let dx=obj.x-player.x
let dy=obj.y-player.y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<range){

dealDamage(obj,50)

spawnBlood(obj.x,obj.y,15)

}

}

}

}



/* ================================
   PLAYER HEALTH BAR
================================ */

const healthBar=document.createElement("div")

healthBar.style.position="absolute"
healthBar.style.left="20px"
healthBar.style.top="20px"
healthBar.style.width="200px"
healthBar.style.height="20px"
healthBar.style.background="#300"

document.body.appendChild(healthBar)

class Boss extends Enemy{

constructor(x,y){

super(x,y)

this.phase=0

this.attackTimer=3

/* =================================
   KRAKEN TENTACLE
================================= */

class KrakenTentacle extends GameObject{

constructor(boss,angle){

super(boss.x,boss.y)

this.boss=boss
this.angle=angle
this.length=120

}

update(dt){

this.x=this.boss.x+Math.cos(this.angle)*this.length
this.y=this.boss.y+Math.sin(this.angle)*this.length

let dx=player.x-this.x
let dy=player.y-this.y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<player.size+20){

dealDamage(player,15)

spawnBlood(player.x,player.y,6)

}

}

draw(ctx){

ctx.strokeStyle="#6600aa"

ctx.lineWidth=10

ctx.beginPath()

ctx.moveTo(
this.boss.x-camera.x+GAME_WIDTH/2,
this.boss.y-camera.y+GAME_HEIGHT/2)

ctx.lineTo(
this.x-camera.x+GAME_WIDTH/2,
this.y-camera.y+GAME_HEIGHT/2)

ctx.stroke()

}

}



/* =================================
   ANCIENT KRAKEN
================================= */

class AncientKraken extends Boss{

constructor(x,y){

super(x,y)

this.size=120
this.speed=40
this.health=2000
this.damage=40

this.tentacles=[]

for(let i=0;i<8;i++){

let angle=i*Math.PI/4

let t=new KrakenTentacle(this,angle)

this.tentacles.push(t)

engine.add(t)

}

}



update(dt){

super.update(dt)

this.attackTimer-=dt

if(this.attackTimer<=0){

this.attack()

this.attackTimer=5

}

}



attack(){

let dx=player.x-this.x
let dy=player.y-this.y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<400){

spawnShockwave(this.x,this.y)

}

}



draw(ctx){

let px=this.x-camera.x+GAME_WIDTH/2
let py=this.y-camera.y+GAME_HEIGHT/2



/* body */

ctx.fillStyle="#440088"

ctx.beginPath()

ctx.arc(px,py,this.size,0,Math.PI*2)

ctx.fill()



/* eye */

ctx.fillStyle="#fff"

ctx.beginPath()

ctx.arc(px,py,20,0,Math.PI*2)

ctx.fill()

ctx.fillStyle="#000"

ctx.beginPath()

ctx.arc(px,py,10,0,Math.PI*2)

ctx.fill()

}

}



/* =================================
   SHOCKWAVE ATTACK
================================= */

class Shockwave extends GameObject{

constructor(x,y){

super(x,y)

this.radius=0
this.max=400

}

update(dt){

this.radius+=200*dt

if(this.radius>this.max) this.dead=true



let dx=player.x-this.x
let dy=player.y-this.y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<this.radius+player.size && dist>this.radius-20){

dealDamage(player,30)

spawnBlood(player.x,player.y,10)

}

}



draw(ctx){

ctx.strokeStyle="rgba(200,0,255,0.6)"

ctx.lineWidth=6

ctx.beginPath()

ctx.arc(
this.x-camera.x+GAME_WIDTH/2,
this.y-camera.y+GAME_HEIGHT/2,
this.radius,
0,
Math.PI*2)

ctx.stroke()

}

}



function spawnShockwave(x,y){

engine.add(new Shockwave(x,y))

}

    xp: 0,

            this.levelUp()
        }
    },

    levelUp(){
        this.level++

        this.xpToNext = Math.floor(this.xpToNext * 1.35)

        UI.showLevelUp(this.level)

        Player.maxHealth += 10
        Player.health = Player.maxHealth

}

/* =========================
   PART 8 — SAVE SYSTEM
========================= */

const SaveSystem = {

    save(){

        const data = {

            coins: Economy.coins,
            upgrades: Economy.upgrades,

            level: Progression.level,
            xp: Progression.xp,
            xpToNext: Progression.xpToNext,

            achievements: Achievements.list

        }

        localStorage.setItem("oceanGameSave", JSON.stringify(data))

    },

    load(){

        const raw = localStorage.getItem("oceanGameSave")

        if(!raw) return

        const data = JSON.parse(raw)

        Economy.coins = data.coins || 0
        Economy.upgrades = data.upgrades || {}

        Progression.level = data.level || 1
        Progression.xp = data.xp || 0
        Progression.xpToNext = data.xpToNext || 100

        if(data.achievements){

            data.achievements.forEach(saved => {

                const a = Achievements.list.find(x => x.id === saved.id)

                if(a){
                    a.unlocked = saved.unlocked
                }

            })

        }

    }

}

/* =========================
   PART 9 — PREDATOR AI
========================= */

class Predator {

    constructor(x, y){

        this.x = x
        this.y = y

        this.width = 120
        this.height = 60

        this.speed = 2 + Math.random() * 2

        this.direction = -1

        this.target = null

        this.health = 50

    }

    update(){

        this.findTarget()

        if(this.target){

            const dx = this.target.x - this.x
            const dy = this.target.y - this.y

            const dist = Math.sqrt(dx*dx + dy*dy)

            if(dist < 400){

                this.x += dx * 0.02
                this.y += dy * 0.02

            }

        }else{

            this.x += this.speed * this.direction

        }

        this.checkBounds()

    }

    findTarget(){

        const dx = Player.x - this.x
        const dy = Player.y - this.y

        const dist = Math.sqrt(dx*dx + dy*dy)

        if(dist < 500){

            this.target = Player

        }else{

            this.target = null

        }

    }

    checkBounds(){

        if(this.x < -200){
            this.x = Game.width + 200
        }

        if(this.x > Game.width + 200){
            this.x = -200
        }

    }

    draw(ctx){

        ctx.fillStyle = "#aa2222"

        ctx.fillRect(this.x, this.y, this.width, this.height)

    }

}


/* =========================
   PART 9 — SHARK CLASS
========================= */

class Shark extends Predator{

    constructor(x,y){

        super(x,y)

        this.speed = 3 + Math.random()*2
        this.damage = 20

    }

    attack(){

        const dx = Player.x - this.x
        const dy = Player.y - this.y

        const dist = Math.sqrt(dx*dx + dy*dy)

        if(dist < 80){

            Player.health -= this.damage

            Effects.screenShake()

        }

    }

    update(){

        super.update()

        this.attack()

    }

}

const OceanCurrents = {

    currents: [],

    spawn(){

        if(Math.random() < 0.01){

            this.currents.push({

                x: Math.random() * Game.width,
                y: Math.random() * Game.height,

                forceX: (Math.random()-0.5) * 0.5,
                forceY: (Math.random()-0.5) * 0.5,

                radius: 200

            })

        }

    },

    update(){

        this.currents.forEach(c=>{

            const dx = Player.x - c.x
            const dy = Player.y - c.y

            const dist = Math.sqrt(dx*dx + dy*dy)

            if(dist < c.radius){

                Player.x += c.forceX
                Player.y += c.forceY

            }

        })

    },

    draw(ctx){

        ctx.strokeStyle = "rgba(100,200,255,0.2)"

        this.currents.forEach(c=>{

            ctx.beginPath()
            ctx.arc(c.x, c.y, c.radius, 0, Math.PI*2)
            ctx.stroke()

        })

    }

}

/* =========================
   PART 10 — PARTICLE ENGINE
========================= */

const Particles = {

    list: [],

    spawn(x, y, vx, vy, life, size, color){

        this.list.push({
            x: x,
            y: y,
            vx: vx,
            vy: vy,
            life: life,
            maxLife: life,
            size: size,
            color: color
        })

    },

    update(){

        for(let i = this.list.length - 1; i >= 0; i--){

            const p = this.list[i]

            p.x += p.vx
            p.y += p.vy

            p.life--

            p.vx *= 0.98
            p.vy *= 0.98

            if(p.life <= 0){
                this.list.splice(i,1)
            }

        }

    },

    draw(ctx){

        this.list.forEach(p=>{

            const alpha = p.life / p.maxLife

            ctx.globalAlpha = alpha
            ctx.fillStyle = p.color

            ctx.beginPath()
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2)
            ctx.fill()

            ctx.globalAlpha = 1

        })

    }

}


/* =========================
   PART 10 — BUBBLE SYSTEM
========================= */

const Bubbles = {

    bubbles: [],

    spawn(x,y){

        this.bubbles.push({

            x:x,
            y:y,
            vy: -1 - Math.random()*1.5,
            size: 2 + Math.random()*4,
            life: 200

        })

    },

    update(){

        for(let i = this.bubbles.length-1;i>=0;i--){

            const b = this.bubbles[i]

            b.y += b.vy
            b.life--

            if(b.life <=0){
                this.bubbles.splice(i,1)
            }

        }

    },

    draw(ctx){

        ctx.strokeStyle = "rgba(200,230,255,0.7)"

        this.bubbles.forEach(b=>{

            ctx.beginPath()
            ctx.arc(b.x, b.y, b.size, 0, Math.PI*2)
            ctx.stroke()

        })

    }

}


/* =========================
   PART 10 — BLOOD EFFECT
========================= */

const BloodEffect = {

    spawn(x,y){

        for(let i=0;i<12;i++){

            const angle = Math.random()*Math.PI*2

            const speed = Math.random()*3

            const vx = Math.cos(angle)*speed
            const vy = Math.sin(angle)*speed

            Particles.spawn(
                x,
                y,
                vx,
                vy,
                60,
                3,
                "#aa0000"
            )

        }

    }

}


/* =========================
   PART 10 — BIOLUMINESCENT
========================= */

const GlowFish = {

    list: [],

    spawn(){

        if(Math.random() < 0.01){

            this.list.push({

                x: Math.random()*Game.width,
                y: Math.random()*Game.height,

                size: 6 + Math.random()*6,
                glow: 0

            })

        }

    },

    update(){

        this.list.forEach(g=>{

            g.glow += 0.05

        })

    },

    draw(ctx){

        this.list.forEach(g=>{

            const glow = (Math.sin(g.glow)+1)/2

            ctx.beginPath()

            ctx.fillStyle = `rgba(120,255,200,${0.3+glow*0.5})`

            ctx.arc(g.x, g.y, g.size + glow*5, 0, Math.PI*2)

            ctx.fill()

        })

    }

}


/* =========================
   PART 10 — SCREEN SHAKE
========================= */

const Effects = {

    shake:0,

    screenShake(){

        this.shake = 10

    },

    apply(ctx){

        if(this.shake > 0){

            const dx = (Math.random()-0.5)*this.shake
            const dy = (Math.random()-0.5)*this.shake

            ctx.translate(dx,dy)

            this.shake *= 0.9

        }

    }

}


/* =========================
   PART 10 — WATER PARTICLES
========================= */

const WaterParticles = {

    spawn(){

        if(Math.random() < 0.2){

            const x = Math.random()*Game.width
            const y = Math.random()*Game.height

            Particles.spawn(
                x,
                y,
                0,
                -0.2,
                120,
                1,
                "rgba(200,220,255,0.4)"
            )

        }

    }

} 
/* =========================
   PART 11 — BOSS SYSTEM
========================= */

const BossSystem = {

    bosses: [],

    spawnKraken(){

        const kraken = new Kraken(
            Player.x + 600,
            Player.y
        )

        this.bosses.push(kraken)

    },

    spawnWhale(){

        const whale = new KillerWhale(
            Player.x + 800,
            Player.y
        )

        this.bosses.push(whale)

    },

    update(){

        this.bosses.forEach(b=>b.update())

    },

    draw(ctx){

        this.bosses.forEach(b=>b.draw(ctx))

    }

}


/* =========================
   PART 11 — GIANT SQUID
========================= */

class GiantSquid {

    constructor(x,y){

        this.x = x
        this.y = y

        this.width = 180
        this.height = 120

        this.health = 300

        this.speed = 1.5

        this.attackTimer = 0

    }

    update(){

        const dx = Player.x - this.x
        const dy = Player.y - this.y

        const dist = Math.sqrt(dx*dx + dy*dy)

        if(dist < 600){

            this.x += dx * 0.01
            this.y += dy * 0.01

        }

        this.attackTimer++

        if(this.attackTimer > 120){

            this.inkAttack()

            this.attackTimer = 0

        }

    }

    inkAttack(){

        for(let i=0;i<20;i++){

            const angle = Math.random()*Math.PI*2

            const vx = Math.cos(angle)*2
            const vy = Math.sin(angle)*2

            Particles.spawn(
                this.x,
                this.y,
                vx,
                vy,
                80,
                4,
                "#111111"
            )

        }

    }

    draw(ctx){

        ctx.fillStyle = "#663399"

        ctx.fillRect(
            this.x,
            this.y,
            this.width,
            this.height
        )

    }

}


/* =========================
   PART 11 — KILLER WHALE
========================= */

class KillerWhale {

    constructor(x,y){

        this.x = x
        this.y = y

        this.width = 220
        this.height = 100

        this.speed = 3

        this.health = 500

        this.attackCooldown = 0

    }

    update(){

        const dx = Player.x - this.x
        const dy = Player.y - this.y

        const dist = Math.sqrt(dx*dx + dy*dy)

        if(dist < 900){

            this.x += dx * 0.015
            this.y += dy * 0.015

        }

        this.attackCooldown--

        if(dist < 150 && this.attackCooldown <= 0){

            this.biteAttack()

            this.attackCooldown = 90

        }

    }

    biteAttack(){

        Player.health -= 30

        BloodEffect.spawn(
            Player.x,
            Player.y
        )

        Effects.screenShake()

    }

    draw(ctx){

        ctx.fillStyle = "#111"

        ctx.fillRect(
            this.x,
            this.y,
            this.width,
            this.height
        )

    }

}


/* =========================
   PART 11 — ANCIENT KRAKEN
========================= */

class Kraken {

    constructor(x,y){

        this.x = x
        this.y = y

        this.width = 400
        this.height = 300

        this.health = 1500

        this.phase = 1

        this.attackTimer = 0

    }

    update(){

        const dx = Player.x - this.x
        const dy = Player.y - this.y

        const dist = Math.sqrt(dx*dx + dy*dy)

        if(dist < 1200){

            this.x += dx * 0.005
            this.y += dy * 0.005

        }

        this.attackTimer++

        if(this.phase === 1){

            if(this.attackTimer > 150){

                this.tentacleStrike()

                this.attackTimer = 0

            }

        }

        if(this.health < 800){
            this.phase = 2
        }

        if(this.phase === 2){

            if(this.attackTimer > 90){

                this.inkStorm()

                this.attackTimer = 0

            }

        }

    }

    tentacleStrike(){

        const dx = Player.x - this.x
        const dy = Player.y - this.y

        const dist = Math.sqrt(dx*dx + dy*dy)

        if(dist < 200){

            Player.health -= 50

            BloodEffect.spawn(Player.x,Player.y)

            Effects.screenShake()

        }

    }

    inkStorm(){

        for(let i=0;i<50;i++){

            const angle = Math.random()*Math.PI*2

            const vx = Math.cos(angle)*3
            const vy = Math.sin(angle)*3

            Particles.spawn(
                this.x,
                this.y,
                vx,
                vy,
                120,
                5,
                "#000000"
            )

        }

    }

    draw(ctx){

        ctx.fillStyle = "#220033"

        ctx.fillRect(
            this.x,
            this.y,
            this.width,
            this.height
        )

    }

} 
/* =========================
   PART 12 — COIN SYSTEM
========================= */

const Economy = {

    coins: 0,

    add(amount){

        this.coins += amount

        UI.updateCoins()

    },

    spend(amount){

        if(this.coins >= amount){

            this.coins -= amount
            UI.updateCoins()

            return true
        }

        return false

    }

}


/* =========================
   PART 12 — ABILITY SYSTEM
========================= */

const Abilities = {

    dashCooldown: 0,
    biteCooldown: 0,
    shockwaveCooldown: 0,
    frenzyCooldown: 0,
    roarCooldown: 0,

    update(){

        this.dashCooldown = Math.max(0,this.dashCooldown-1)
        this.biteCooldown = Math.max(0,this.biteCooldown-1)
        this.shockwaveCooldown = Math.max(0,this.shockwaveCooldown-1)
        this.frenzyCooldown = Math.max(0,this.frenzyCooldown-1)
        this.roarCooldown = Math.max(0,this.roarCooldown-1)

    },

    dash(){

        if(this.dashCooldown === 0){

            Player.x += Player.vx * 50
            Player.y += Player.vy * 50

            this.dashCooldown = 120

        }

    },

    bite(){

        if(this.biteCooldown === 0){

            EnemySpawner.predators.forEach(e=>{

                const dx = e.x - Player.x
                const dy = e.y - Player.y

                const dist = Math.sqrt(dx*dx + dy*dy)

                if(dist < 80){

                    e.health -= 50

                    BloodEffect.spawn(e.x,e.y)

                }

            })

            this.biteCooldown = 40

        }

    },

    shockwave(){

        if(this.shockwaveCooldown === 0){

            EnemySpawner.predators.forEach(e=>{

                const dx = e.x - Player.x
                const dy = e.y - Player.y

                const dist = Math.sqrt(dx*dx + dy*dy)

                if(dist < 200){

                    e.x += dx * 2
                    e.y += dy * 2

                }

            })

            this.shockwaveCooldown = 300

        }

    }

}


/* =========================
   PART 12 — EVOLUTION TREE
========================= */

const Evolution = {

    stage: 1,

    stages: [

        "Tiny Fish",
        "Small Fish",
        "Hunter Fish",
        "Barracuda",
        "Shark",
        "Mega Shark",
        "Leviathan"

    ],

    evolve(){

        if(Player.level >= 5 && this.stage < this.stages.length){

            this.stage++

            Player.size += 10
            Player.speed += 0.5

        }

    }

}


/* =========================
   PART 12 — SAVE SYSTEM
========================= */

const SaveSystem = {

    save(){

        const data = {

            coins: Economy.coins,
            level: Player.level,
            xp: Player.xp,
            evolution: Evolution.stage

        }

        localStorage.setItem(
            "oceanOverlordSave",
            JSON.stringify(data)
        )

    },

    load(){

        const data = localStorage.getItem("oceanOverlordSave")

        if(data){

            const save = JSON.parse(data)

            Economy.coins = save.coins
            Player.level = save.level
            Player.xp = save.xp
            Evolution.stage = save.evolution

        }

    }

}


/* =========================
   PART 12 — ADS SYSTEM
========================= */

const Ads = {

    showInterstitialAd(){

        console.log("Yandex interstitial ad")

        if(window.ysdk){

            ysdk.adv.showFullscreenAdv()

        }

    },

    showRewardedAd(callback){

        console.log("Yandex rewarded ad")

        if(window.ysdk){

            ysdk.adv.showRewardedVideo({
                callbacks:{
                    onRewarded:callback
                }
            })

        }

    }

}


/* =========================
   PART 12 — GAME LOOP
========================= */

function gameLoop(){

    requestAnimationFrame(gameLoop)

    update()
    render()

}


/* =========================
   PART 12 — UPDATE
========================= */

function update(){

    Input.update()

    Player.update()

    FishSpawner.update()

    EnemySpawner.update()

    BossSystem.update()

    Particles.update()

    Bubbles.update()

    GlowFish.update()

    OceanCurrents.update()

    Abilities.update()

}


/* =========================
   PART 12 — RENDER
========================= */

function render(){

    ctx.clearRect(0,0,Game.width,Game.height)

    Effects.apply(ctx)

    OceanRenderer.draw(ctx)

    FishSpawner.draw(ctx)

    EnemySpawner.draw(ctx)

    BossSystem.draw(ctx)

    Player.draw(ctx)

    Bubbles.draw(ctx)

    GlowFish.draw(ctx)

    Particles.draw(ctx)

}


/* =========================
   START GAME
========================= */

SaveSystem.load()

gameLoop() 


</script>
